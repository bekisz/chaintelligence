<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaintelligence | LP Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/favicon.png?v=side-brain-minimal">
    <link rel="stylesheet" href="/static/style.css?v=25.3">
    <script src="/static/lp.js?v=18.2"></script>
</head>

<body>
    <!-- Unified Uniswap-Style Header -->
    <header class="unified-header">
        <div class="header-content">
            <a href="/" class="logo-section">
                <img src="/static/logo.png?v=side-brain-minimal" alt="Chaintelligence" class="logo-icon">
                <span class="logo-text">Chaintelligence</span>
            </a>

            <nav class="nav-links">
                <a href="/lp" class="nav-link">LP Positions</a>
                <a href="/pool" class="nav-link">Pool Explorer</a>
                <a href="/backtester" class="nav-link">Backtest</a>
                <a href="/routing" class="nav-link">Route Analysis</a>
                <a href="/sps" class="nav-link">SPS</a>
                <a href="/docs" class="nav-link">API</a>
            </nav>
        </div>
    </header>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <nav class="glass main-nav" style="display: none;">
            <a href="/">Home</a>
            <a href="/routing">Route Analysis</a>
            <a href="/lp" class="active">LP Positions</a>
            <a href="/backtester">Backtester</a>
        </nav>

        <header style="display:none;">
        </header>

        <main>
            <section id="lp-summary-section" class="results-container">
                <div class="summary-cards">
                    <div class="card glass highlight-card">
                        <h3>Total Portfolio Value</h3>
                        <p id="total-portfolio-value" class="stat">--</p>
                    </div>
                    <div class="card glass highlight-card highlight-accent">
                        <h3>Total Unclaimed Rewards</h3>
                        <p id="total-rewards" class="stat">--</p>
                    </div>
                </div>

                <div class="controls-bar glass">
                    <div class="filter-group">
                        <label>Filter:</label>
                        <select id="network-filter">
                            <option value="all">All Networks</option>
                            <option value="Ethereum">Ethereum</option>
                            <option value="Arbitrum">Arbitrum</option>
                            <option value="Base">Base</option>
                            <option value="Polygon">Polygon</option>
                        </select>
                        <select id="protocol-filter">
                            <option value="all">All Protocols</option>
                        </select>
                        <select id="wallet-filter">
                            <option value="all">All Wallets</option>
                        </select>
                        <input type="text" id="search-filter" placeholder="Search pair...">
                        <div style="display:flex; align-items:center; margin-left:1rem;">
                            <input type="checkbox" id="hide-closed-filter" checked>
                            <label for="hide-closed-filter"
                                style="margin-left:0.4rem; font-size:0.8rem; cursor:pointer; text-transform:none;">Hide
                                Closed</label>
                        </div>
                    </div>
                    <div class="sort-group">
                        <label>Sort by:</label>
                        <select id="sort-by">
                            <option value="value-desc">Value (High to Low)</option>
                            <option value="value-asc">Value (Low to High)</option>
                            <option value="rewards-desc">Rewards (High to Low)</option>
                            <option value="rewards-asc">Rewards (Low to High)</option>
                            <option value="pair">Pair Name</option>
                        </select>
                    </div>
                </div>

                <div id="positions-grid" class="positions-grid">
                    <!-- Position cards will be injected here -->
                </div>
            </section>

            <div id="loader" class="loader-container hidden">
                <div class="spinner"></div>
                <p>Fetching LP snapshots from Postgres...</p>
            </div>

            <div id="no-data" class="no-data-msg hidden">
                <p>No liquidity position snapshots found in the database.</p>
            </div>
        </main>

        <footer>
        </footer>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Position History</h2>
            <div id="modal-loader" class="loader-container hidden">
                <div class="spinner"></div>
            </div>
            <div id="modal-body" class="history-table-container">
                <!-- Table will be injected here -->
            </div>
        </div>
    </div>

    <script src="/static/nav.js"></script>
    <!-- Script moved to head -->
</body>

</html>
