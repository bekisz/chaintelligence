x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env.config
    - .env.secrets
  environment: &airflow-common-env
    PYTHONPATH: "/opt/airflow:/opt/airflow/dags:${PYTHONPATH:-}"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONWARNINGS: "ignore::DeprecationWarning,ignore:ASGI app factory:UserWarning"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'

    AIRFLOW__FAB__AUTH_BACKENDS: 'airflow.providers.fab.auth_manager.api.auth.backend.basic_auth,airflow.providers.fab.auth_manager.api.auth.backend.session'
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
    AIRFLOW__SIMPLE_AUTH_MANAGER__USERS: 'airflow:airflow'

    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 10
    AIRFLOW__CORE__INTERNAL_API_URL: 'http://airflow-webserver:8080'
    AIRFLOW__FAB__ENABLE_PROXY_FIX: True
    AIRFLOW__API__EXPOSE_CONFIG: True
    AIRFLOW__API__BASE_URL: http://localhost:8081
    AIRFLOW_CONN_CHAINTELLIGENCE_DB: postgresql://airflow:airflow@postgres:5432/chaintelligence
    RPC_LOG_BATCH_SIZE: 500

  volumes:
    - ./chain-feeder/dags:/opt/airflow/dags
    - ./chain-feeder/include:/opt/airflow/include
    - ./chain-feeder/logs:/opt/airflow/logs
    - ./chain-feeder/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./chain-feeder/include/sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    depends_on:
      - postgres

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    environment:
      <<: *airflow-common-env
    ports:
      - "8081:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    environment:
      <<: *airflow-common-env
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    environment:
      <<: *airflow-common-env
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  chaintelligence-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chaintelligence-server
    env_file:
      - .env.config
      - .env.secrets
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - ./.env:/app/.env
      - ./api:/app/api
      - ./web:/app/web
      - ./chain-feeder:/app/chain-feeder
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-db-volume:
