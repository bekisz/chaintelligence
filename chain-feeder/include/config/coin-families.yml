coin-families:
  - name: ETH
    coin-list:
      - ETH
      - STETH
      - rETH
      - WETH
    regexp-rule: ".*ETH$"

  - name: SOL
    coin-list:
      - SOL
      - mSOL

  - name: Tier1
    sql-rule: "cmc_rank < 100"
    include-coin:
      - PENDLE

  - name: Stablecoins
    sql-rule: "symbol IN ('GHO', 'DAI', 'MIM')"
    regexp-rule: ".*USD.*"
    